<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    background: url("https://i.imgur.com/8QfQxjA.jpg") no-repeat center center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* dark overlay like game UI */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

/* login box */
.login-box {
    position: relative;
    width: 90%;
    max-width: 350px;
    padding: 25px;
    background: rgba(0,0,0,0.75);
    border: 2px solid #00f7ff;
    border-radius: 15px;
    box-shadow: 0 0 20px #00f7ff;
    text-align: center;
    color: white;
}

/* title glow */
.login-box h1 {
    margin-bottom: 20px;
    color: #00f7ff;
    text-shadow: 0 0 10px #00f7ff;
}

/* input fields */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 8px;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

/* button */
button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, #00f7ff, #ff00ff);
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* fake footer */
.footer {
    margin-top: 10px;
    font-size: 12px;
    opacity: 0.7;
}
</style>

</head>

<body>

<div class="overlay"></div>

<div class="login-box">
    <h1>HELLO WROLD
    LLET HACK</h1>

    <input type="text" placeholder="Player ID">
    <input type="password" placeholder="Password">

    <button onclick="login()">LOGIN</button>

    <div class="footer">free diamonds</div>
</div>

<script>
function login(){
    alert("Loading game lobby...");
    document.body.innerHTML = `
        <div style="
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:black;
            font-size:22px;
        ">
        CONGRATULATIONS💎💎CHECK GAME INBOX...
        </div>
    `;
}
</script>

</body>
  </html>

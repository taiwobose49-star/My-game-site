<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QPay App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    background:linear-gradient(135deg,#00c853,#00e676,#00b248);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* APP CONTAINER */
.app{
    width:100%;
    max-width:420px;
    height:100vh;
    background:#fff;
    position:relative;
    overflow:hidden;
}

/* PAGES */
.page{
    display:none;
    padding:25px;
    height:calc(100vh - 70px);
    overflow-y:auto;
}

.page.active{
    display:block;
}

/* TOP CARD */
.card{
    background:linear-gradient(135deg,#00c853,#00e676);
    padding:20px;
    border-radius:15px;
    color:white;
    margin-top:15px;
}

.balance{
    font-size:28px;
    font-weight:bold;
}

/* BUTTONS */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#00c853;
    color:white;
    font-weight:bold;
    margin-top:15px;
    cursor:pointer;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ddd;
    text-align:center;
}

/* NAV BAR */
.nav{
    position:absolute;
    bottom:0;
    width:100%;
    height:70px;
    background:#111;
    display:flex;
    justify-content:space-around;
    align-items:center;
}

.nav div{
    color:#aaa;
    font-size:12px;
    text-align:center;
    cursor:pointer;
}

.nav div.active{
    color:#00e676;
}

/* ICON STYLE */
.icon{
    font-size:18px;
    display:block;
    margin-bottom:3px;
}

/* SECTIONS */
.section{
    display:none;
}

.section.active{
    display:block;
}

/* PROFILE */
.profile-box{
    text-align:center;
    margin-top:20px;
}

.avatar{
    width:80px;
    height:80px;
    background:#00c853;
    border-radius:50%;
    margin:0 auto;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    color:#fff;
}
</style>
</head>

<body>

<div class="app">

<!-- HOME -->
<div class="page active" id="home">
    <h2>Home</h2>

    <div class="card">
        <p>Welcome, Iremide 👋</p>
        <div class="balance">₦10,000</div>
    </div>

    <button onclick="goSend()">Send Money</button>
</div>

<!-- SEND -->
<div class="page" id="send">
    <h2>Send Money</h2>

    <input type="text" placeholder="Recipient Number">
    <input type="number" placeholder="Amount (₦)">

    <button onclick="sendMoney()">Send</button>
</div>

<!-- WALLET -->
<div class="page" id="wallet">
    <h2>Wallet</h2>

    <div class="card">
        <p>Main Balance</p>
        <div class="balance">₦10,000</div>
    </div>

    <div class="card">
        <p>Bonus Balance</p>
        <div class="balance">₦500</div>
    </div>
</div>

<!-- PROFILE -->
<div class="page" id="profile">
    <h2>Profile</h2>

    <div class="profile-box">
        <div class="avatar">I</div>
        <h3>Iremide</h3>
        <p>Verified User</p>
    </div>
</div>

<!-- BOTTOM NAV -->
<div class="nav">
    <div class="active" onclick="showPage('home',this)">
        <span class="icon">🏠</span>
        Home
    </div>

    <div onclick="showPage('send',this)">
        <span class="icon">💸</span>
        Send
    </div>

    <div onclick="showPage('wallet',this)">
        <span class="icon">👛</span>
        Wallet
    </div>

    <div onclick="showPage('profile',this)">
        <span class="icon">👤</span>
        Profile
    </div>
</div>

</div>

<script>

function showPage(page,el){

    // hide pages
    let pages=document.querySelectorAll(".page");
    pages.forEach(p=>p.classList.remove("active"));

    document.getElementById(page).classList.add("active");

    // nav active state
    let navs=document.querySelectorAll(".nav div");
    navs.forEach(n=>n.classList.remove("active"));

    el.classList.add("active");
}

function goSend(){
    showPage("send",document.querySelectorAll(".nav div")[1]);
}

function sendMoney(){
    alert("Money sent successfully ✔️");
    showPage("home",document.querySelectorAll(".nav div")[0]);
}

</script>

</body>
</html>

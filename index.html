<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QPay App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#fff;
}

/* DARK MODE */
body.dark{
    background:#0f0f0f;
    color:#fff;
}

.app{
    width:100%;
    max-width:420px;
    height:100vh;
    position:relative;
    overflow:hidden;
}

/* SCREENS */
.screen{
    display:none;
    padding:25px;
    height:100vh;
}

.screen.active{
    display:block;
}

/* LOGO */
.logo{
    width:150px;
    height:80px;
    margin:0 auto 20px;
    border-radius:18px;
    background:linear-gradient(135deg,#fff,#f2f2f2);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    font-weight:bold;
    position:relative;
    border:1px solid #eee;
}

.q{color:#00c853;}
.pay{color:#111;}

h2{text-align:center;color:#00a63e;}

input{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
    border:1px solid #ddd;
    text-align:center;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#00c853;
    color:#fff;
    font-weight:bold;
    margin-top:10px;
    cursor:pointer;
}

/* LOADER */
.loader{
    width:60px;
    height:60px;
    border:6px solid #ddd;
    border-top:6px solid #00c853;
    border-radius:50%;
    margin:20px auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

/* DASHBOARD */
.card{
    background:linear-gradient(135deg,#00c853,#00e676);
    padding:20px;
    border-radius:15px;
    color:white;
    margin-top:20px;
}

.balance{
    font-size:28px;
    font-weight:bold;
}

/* SETTINGS ICON */
.settings{
    position:absolute;
    top:15px;
    right:15px;
    font-size:20px;
    cursor:pointer;
}

/* SETTINGS PAGE */
.setting-item{
    padding:15px;
    background:#f3f3f3;
    margin-bottom:10px;
    border-radius:10px;
    cursor:pointer;
}

body.dark .setting-item{
    background:#1e1e1e;
}

/* TOGGLE SWITCH */
.switch{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:10px;
}

.toggle{
    width:50px;
    height:25px;
    background:#ccc;
    border-radius:20px;
    position:relative;
    cursor:pointer;
}

.toggle::after{
    content:"";
    width:20px;
    height:20px;
    background:#fff;
    position:absolute;
    top:2.5px;
    left:3px;
    border-radius:50%;
    transition:0.3s;
}

.toggle.active{
    background:#00c853;
}

.toggle.active::after{
    left:27px;
}

/* NAV */
.nav{
    position:absolute;
    bottom:0;
    width:100%;
    height:70px;
    background:#111;
    display:flex;
    justify-content:space-around;
    align-items:center;
}

.nav div{
    color:#aaa;
    font-size:12px;
    text-align:center;
}

.nav div.active{
    color:#00e676;
}
</style>
</head>

<body>

<div class="app">

<!-- LOGIN -->
<div class="screen active" id="login">
    <div class="logo">
        <span class="q">Q</span><span class="pay">Pay</span>
    </div>

    <h2>Login</h2>

    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<!-- PIN -->
<div class="screen" id="pin">
    <h2>Enter PIN</h2>
    <input id="pinInput" type="password" maxlength="4">
    <button onclick="checkPin()">Continue</button>
</div>

<!-- LOADING -->
<div class="screen" id="load">
    <h2>Verifying...</h2>
    <div class="loader"></div>
</div>

<!-- DASHBOARD -->
<div class="screen" id="home">

    <div class="settings" onclick="show('settings')">⚙️</div>

    <h2>Welcome 👋</h2>

    <div class="card">
        <p>Available Balance</p>
        <div class="balance" id="balance">₦10,000</div>
    </div>

</div>

<!-- SETTINGS -->
<div class="screen" id="settings">

    <h2>Settings</h2>

    <div class="setting-item">👤 Profile</div>
    <div class="setting-item">💳 Payments</div>
    <div class="setting-item">🔐 Login Settings</div>
    <div class="setting-item">💰 Savings Account</div>
    <div class="setting-item">🏠 Homepage Settings</div>
    <div class="setting-item">🔔 SMS Alert Settings</div>

    <div class="setting-item">
        🌙 Themes
        <div class="switch">
            <small>Dark Mode</small>
            <div class="toggle" onclick="toggleTheme(this)"></div>
        </div>
    </div>

    <button onclick="show('home')">Back</button>
</div>

</div>

<script>

function show(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* LOGIN */
function login(){
    if(document.getElementById("pass").value==="0000"){
        show("pin");
    }else{
        alert("Wrong password");
    }
}

/* PIN */
function checkPin(){
    if(document.getElementById("pinInput").value==="1234"){
        show("load");
        setTimeout(()=>show("home"),2000);
    }else{
        alert("Wrong PIN");
    }
}

/* THEME */
function toggleTheme(el){
    el.classList.toggle("active");
    document.body.classList.toggle("dark");
}

</script>

</body>
</html>
